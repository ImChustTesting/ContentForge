name: test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  unit-app:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npm test --if-present

  unit-worker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: worker/package-lock.json
      - run: npm ci
      - run: npm test --if-present

  smoke:
    runs-on: ubuntu-latest
    needs: [unit-app, unit-worker]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    services:
      postgres:
        image: postgres:16-bookworm
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: testpw
          POSTGRES_DB: contentforge
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app -d contentforge"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://app:testpw@localhost:5432/contentforge
      SESSION_SECRET: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      DATA_DIR: ${{ github.workspace }}/data
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Install worker Python deps
        working-directory: worker
        run: pip install -r requirements.txt
      - name: Install worker Node deps
        working-directory: worker
        run: npm ci
      - name: Install app Node deps
        working-directory: app
        run: npm ci
      - name: Run smoke test
        working-directory: worker
        run: npm run test:smoke --if-present
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
