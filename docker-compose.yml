services:
  app:
    image: ghcr.io/imchusttesting/contentforge-app:${VERSION:-latest}
    build:
      context: .
      dockerfile: ./app/Dockerfile
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgres://app:${POSTGRES_PASSWORD}@db:5432/contentforge
      SESSION_SECRET: ${SESSION_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      DATA_DIR: /data
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      BEHIND_TLS: ${BEHIND_TLS:-false}
      MAX_SOURCE_MINUTES: ${MAX_SOURCE_MINUTES:-30}
    volumes:
      - data:/data
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "fetch('http://localhost:3000/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  worker:
    image: ghcr.io/imchusttesting/contentforge-worker:${VERSION:-latest}
    build:
      context: .
      dockerfile: ./worker/Dockerfile
    environment:
      DATABASE_URL: postgres://app:${POSTGRES_PASSWORD}@db:5432/contentforge
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      DATA_DIR: /data
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      WORKER_CONCURRENCY_EDIT: ${WORKER_CONCURRENCY_EDIT:-2}
      WORKER_CONCURRENCY_REFRAME: ${WORKER_CONCURRENCY_REFRAME:-1}
      ENCODE_PRESET: ${ENCODE_PRESET:-veryfast}
      WHISPER_MODEL: ${WHISPER_MODEL:-small}
    volumes:
      - data:/data
    depends_on:
      db:
        condition: service_healthy
      app:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4g

  db:
    image: postgres:16-bookworm
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: contentforge
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d contentforge"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  data:
    driver: local
  postgres-data:
    driver: local
